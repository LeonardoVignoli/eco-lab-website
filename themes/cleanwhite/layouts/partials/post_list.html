<!-- News cards -->
<div data-pagefind-ignore="all" class="news-grid">
{{ range $.Paginator.Pages }}
<article class="news-card">
    <a class="news-card-image" href="{{ .RelPermalink }}" aria-label="{{ .Title }}">
        <img src="{{ .Params.image | default "/img/home-bg.jpg" | relURL }}" alt="" loading="lazy">
    </a>
    <div class="news-card-body">
        <time class="news-card-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date | time.Format ":date_long" }}</time>
        <h2 class="news-card-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        {{ with .Params.subtitle }}
        <p class="news-card-subtitle">{{ . }}</p>
        {{ end }}
        {{ with .Params.tags }}
        <div class="news-card-tags">
            {{ range first 3 . }}
            <span>{{ . }}</span>
            {{ end }}
        </div>
        {{ end }}
        <a class="news-card-link" href="{{ .RelPermalink }}">
            {{ if eq .Language.Lang "it" }}Leggi la notizia{{ else }}Read the news{{ end }} <span aria-hidden="true">→</span>
        </a>
    </div>
</article>
{{ end }}
</div>
