<span class="lang-switch" style="margin-left:15px;">
  {{ $p := . }}
  {{ if .IsHome }}{{ $p = .Site.Home }}{{ end }}
  {{ $cur := .Site.Language.Lang }}
  {{ range $p.AllTranslations }}
    {{ if ne .Language.Lang $cur }}
      <a href="{{ .RelPermalink }}">{{ upper .Language.Lang }}</a>
    {{ end }}
  {{ end }}
</span>
