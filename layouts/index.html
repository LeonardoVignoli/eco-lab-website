{{ define "main" }}
{{ $lab := .Site.GetPage "section" "lab" }}
<article>
  <div class="container">
    <div class="row">
      <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1 post-container">
        {{ with $lab }}
          {{ .Content }}
        {{ else }}
          {{ .Content }}
        {{ end }}
      </div>
    </div>
  </div>
</article>
{{ end }}
