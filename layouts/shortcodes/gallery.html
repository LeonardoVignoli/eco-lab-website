<div class="lec-gallery">
  <div class="gallery-wrapper">
    <button class="gallery-button left">‹</button>

    <div class="gallery-container">
      {{ $folder := .Get "folder" }}
      {{ $path := printf "static/%s" $folder }}

      {{ range (readDir $path) }}
        {{ if not .IsDir }}
<img class="gallery-img" src="{{ printf "/%s/%s" $folder .Name | relURL }}" alt="">
        {{ end }}
      {{ end }}
    </div>

    <button class="gallery-button right">›</button>
  </div>
</div>
